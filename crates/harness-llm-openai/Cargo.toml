[package]
name = "harness-llm-openai"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "OpenAI Chat Completions provider for harness"

[dependencies]
harness-core = { path = "../harness-core" }
harness-llm = { path = "../harness-llm" }
harness-llm-types = { path = "../harness-llm-types" }
harness-auth = { path = "../harness-auth" }
harness-storage = { path = "../harness-storage" }
parking_lot = "0.12"

tokio = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = "0.1"

reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
eventsource-stream = "0.2"
bytes = "1"
async-stream = "0.3"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
wiremock = "0.6"
