[package]
name = "harness-storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "SQLite-backed storage layer for harness (WAL, FTS5, writer thread)"

[dependencies]
harness-core = { path = "../harness-core" }

tokio = { workspace = true }
tokio-util = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }

thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
time = { workspace = true }

rusqlite = { version = "0.38", features = ["bundled", "functions", "time", "serde_json", "backup"] }
rusqlite_migration = "2"

[dev-dependencies]
tempfile = "3"
proptest = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
