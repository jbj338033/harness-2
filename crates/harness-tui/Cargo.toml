[package]
name = "harness-tui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "harness terminal UI (ratatui-based client)"

[[bin]]
name = "harness"
path = "src/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
harness-proto = { path = "../harness-proto" }
harness-cli = { path = "../harness-cli" }

tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time"] }
tokio-util = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }

ratatui = { version = "0.29", default-features = false, features = ["crossterm", "scrolling-regions"] }
crossterm = "0.29"
syntect = { version = "5", default-features = false, features = ["parsing", "default-syntaxes", "default-themes", "regex-fancy"] }
pulldown-cmark = { version = "0.12", default-features = false }

[dev-dependencies]
tempfile = "3"
