[package]
name = "harness-transport"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "Unix socket + WebSocket transport for harness JSON-RPC"

[dependencies]
harness-core = { path = "../harness-core" }
harness-proto = { path = "../harness-proto" }
harness-rpc = { path = "../harness-rpc" }
harness-lifecycle = { path = "../harness-lifecycle" }

tokio = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = "0.1"

axum = { version = "0.8", features = ["ws"] }
axum-server = { version = "0.7", features = ["tls-rustls"] }
tower = "0.5"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rustls-pemfile = "2"
rcgen = "0.14"
sha2 = "0.11"
rand = "0.8"

[dev-dependencies]
harness-lifecycle = { path = "../harness-lifecycle" }
tempfile = "3"
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-webpki-roots"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring"] }
webpki-roots = "0.26"
