[package]
name = "harness-tools-shell"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true
description = "Shell command execution tool (bash) with sandbox integration"

[dependencies]
harness-core = { path = "../harness-core" }
harness-tools = { path = "../harness-tools" }

tokio = { workspace = true, features = ["process", "time", "io-util"] }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = "0.1"

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
