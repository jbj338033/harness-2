name: Feature request
description: Something harness should do that it doesn't.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's blocking you?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should harness do? Optional — issues can also be pure problem statements.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
