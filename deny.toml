[graph]
all-features = false

[advisories]
version = 2
yanked = "warn"
ignore = [
  # bincode 1.3.3: upstream archived permanently (syntect → harness-tui). No safe upgrade.
  "RUSTSEC-2025-0141",
  # paste 1.0.15: upstream archived (ratatui → harness-tui). No safe upgrade.
  "RUSTSEC-2024-0436",
  # rustls-pemfile 2.2.0: deprecated in favor of rustls-pki-types (axum-server → harness-transport). No safe upgrade until axum-server migrates.
  "RUSTSEC-2025-0134",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
